name: skill-ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check mirrored skill bundles
        run: python3 tools/sync_skill_bundles.py --check

      - name: Run docs-hub tests
        run: python3 -m unittest discover -s tests -p 'test_skill_*.py'
